 TIEDOSTO 4: .github/workflows/vix-sec-alert.yml
 ══════════════════════════════════════════════════════════════
 name: VIX + SEC hälytys (joka 15 min)
 on:
   schedule:
     - cron: '*/15 * * * *'
   workflow_dispatch:
 jobs:
   alert:
     runs-on: ubuntu-latest
     timeout-minutes: 8
     steps:
       - uses: actions/checkout@v4
       - name: Palauta tila
         uses: actions/cache@v4
         with:
           path: vix_sec_state.json
           key: vixsec-state-${{ github.run_id }}
           restore-keys: |
             vixsec-state-
       - uses: actions/setup-python@v5
         with:
           python-version: '3.11'
       - run: pip install --quiet requests anthropic beautifulsoup4
       - env:
           ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
           TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
           TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
         run: python vix_sec_alert.py
       - name: Tallenna tila
         if: always()
         uses: actions/cache@v4
         with:
           path: vix_sec_state.json
           key: vixsec-state-${{ github.run_id }}
