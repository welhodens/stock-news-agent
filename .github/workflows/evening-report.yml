
 name: Iltakooste (klo 23:00 Suomi)
 on:
   schedule:
     - cron: '0 20 * * 1-5'  # Ma-Pe 20:00 UTC = 23:00 Suomi kesällä
   workflow_dispatch:
 jobs:
   report:
     runs-on: ubuntu-latest
     timeout-minutes: 10
     steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-python@v5
         with:
           python-version: '3.11'
       - run: pip install --quiet requests anthropic
       - env:
           ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
           TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
           TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
         run: python evening_report.py
